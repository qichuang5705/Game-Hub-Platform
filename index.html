<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link
      rel="stylesheet"
      href="https:///pro.fontawesome.com/releases/v5.10.0/css/all.css"
    />
    />
    <title>From login unitop.vn</title>
  </head>
  <body>
    <div id="wrapper">
      <form action="" id="form-login">
        <h1 class="form-heading">Đăng Nhập</h1>
        <div class="form-group">
          <i class="fa fa-user"></i>
          <input type="text" class="form-input" placeholder="Tên đăng nhập" />
        </div>
        <div class="form-group">
          <i class="fa fa-key"></i>
          <input type="password" class="form-input" placeholder="Mật khẩu" />
          <div id="eye">
            <i class="fa fa-eye"></i>
          </div>
        </div>
        <input type="submit" value="Đăng Nhập" class="form-submit" />
        <input type="submit" value="Chơi Thử Trò Chơi" class="form-submit" />
      </form>
    </div>
  </body>
  <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
  <script src="js/app.js"></script>
</html>
